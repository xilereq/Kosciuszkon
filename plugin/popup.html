<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 250px; padding: 10px; font-family: sans-serif; }
    input, button { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
    #status { color: red; font-size: 12px; }
  </style>
</head>
<body>
  <h3>ScamRadar</h3>
  <div id="login-section">
    <input type="text" id="username" placeholder="Nazwa użytkownika">
    <input type="password" id="password" placeholder="Hasło">
    <button id="login-btn">Zaloguj</button>
    <div id="status"></div>
  </div>
  <div id="logged-section" style="display: none;">
    <p>Status: <b style="color: green;">Aktywna</b></p>
    <button id="logout-btn" style="background-color: #dc2626; color: white; border: none; border-radius: 4px; cursor: pointer;">Wyloguj</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
